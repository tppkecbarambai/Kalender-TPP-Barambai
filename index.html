<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender Pendampingan TPP Kec. Barambai</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --success: #10b981;
      --warning: #f59e0b;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --text-muted: #94a3b8;
        --border: #334155;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
   .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
    header {
      text-align: center;
      margin-bottom: 24px;
      padding: 32px 20px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    header h1 { font-size: 1.8rem; margin-bottom: 8px; font-weight: 700; }
    header p { color: var(--text-muted); margin-bottom: 20px; font-size: 15px; }
   .btn-blogspot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
   .btn-blogspot:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(59,130,246,0.3); }
   .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
      background: var(--card);
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }
   .filter-group { flex: 1; min-width: 200px; }
   .filter-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }
   .filter-group select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
    }
   .stats {
      margin-left: auto;
      text-align: right;
      font-size: 13px;
      color: var(--text-muted);
      align-self: flex-end;
    }
   .loading,.error {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
    }
   .kalender-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
   .card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      transition: all 0.2s;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
   .card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
   .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
      gap: 12px;
    }
   .tanggal-badge {
      background: var(--bg);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
   .status-badge {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }
   .status-akan-datang { background: rgba(59,130,246,0.1); color: var(--primary); }
   .status-selesai { background: rgba(16,185,129,0.1); color: var(--success); }
   .status-ditunda { background: rgba(245,158,11,0.1); color: var(--warning); }
   .card h3 {
      font-size: 1.15rem;
      margin-bottom: 14px;
      font-weight: 700;
      line-height: 1.4;
    }
   .meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
   .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }
   .meta-item svg { width: 16px; height: 16px; flex-shrink: 0; }
   .keterangan {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      padding: 24px;
      color: var(--text-muted);
      font-size: 14px;
    }
    footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    @media (max-width: 768px) {
     .container { padding: 12px; }
      header { padding: 24px 16px; }
      header h1 { font-size: 1.5rem; }
     .kalender-grid { grid-template-columns: 1fr; }
     .controls { flex-direction: column; }
     .stats { margin-left: 0; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📅 Kalender Pendampingan TPP</h1>
      <p>Kecamatan Barambai |2026</p>
      <a href="https://tppkecamatanbarambai.blogspot.com/?m=1" target="_blank" class="btn-blogspot">
        Kunjungi Blogspot TPP →
      </a>
    </header>

    <div class="controls">
      <div class="filter-group">
        <label for="filter-desa">Filter Desa</label>
        <select id="filter-desa">
          <option value="semua">Semua Desa</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-status">Filter Status</label>
        <select id="filter-status">
          <option value="semua">Semua Status</option>
          <option value="Akan Datang">Akan Datang</option>
          <option value="Selesai">Selesai</option>
          <option value="Ditunda">Ditunda</option>
        </select>
      </div>
      <div class="stats" id="stats">Memuat...</div>
    </div>

    <div id="kalender-list" class="kalender-grid">
      <div class="loading">Mengambil data terbaru...</div>
    </div>

    <footer>
      <p>Dikelola oleh Tim Pendamping Profesional Kec. Barambai</p>
      <p>Update otomatis dari <a href="#" id="link-sheet" target="_blank">Google Sheets</a> • Hosted on GitHub Pages</p>
    </footer>
  </div>

  <script>
    // ===== GANTI URL INI PAKAI LINK CSV DARI GOOGLE SHEETS KAMU =====
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQI4y7_aieOr6S-pQUvGNi0lWiQLqGU34VuGyfUkAHfM3KFtepOIbo_wRcKn2nDg/pub?gid=1997673015&single=true&output=csv';
    // ===============================================================

    const listEl = document.getElementById('kalender-list');
    const filterDesaEl = document.getElementById('filter-desa');
    const filterStatusEl = document.getElementById('filter-status');
    const statsEl = document.getElementById('stats');
    const linkSheetEl = document.getElementById('link-sheet');

    linkSheetEl.href = sheetURL.replace('/pub?output=csv', '/edit');

    // Fungsi parsing CSV yang aman buat koma & tanda kutip
    function parseCSV(text) {
      const rows = text.split('\n').filter(row => row.trim());
      const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
      return rows.slice(1).map(row => {
        const values = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
        let obj = {};
        headers.forEach((header, i) => {
          obj[header] = values[i]? values[i].replace(/^"|"$/g, '').trim() : '';
        });
        return obj;
      }).filter(obj => obj.tanggal); // Skip baris kosong
    }

    let allData = [];

    async function loadData() {
      try {
        const response = await fetch(sheetURL + '&t=' + Date.now()); // Cache buster
        const csvText = await response.text();
        allData = parseCSV(csvText).reverse(); // Dibalik biar entry terbaru di atas

        // Isi dropdown desa - cuma ambil dari kolom 'desa'
        const desaUnik = [...new Set(allData.map(k => k.desa))].filter(d => d).sort();
        filterDesaEl.innerHTML = '<option value="semua">Semua Desa</option>';
        desaUnik.forEach(desa => {
          filterDesaEl.innerHTML += `<option value="${desa}">${desa}</option>`;
        });

        renderKalender();
      } catch (error) {
        listEl.innerHTML = `<div class="error">Gagal memuat data. Pastikan link Google Sheets sudah dipublikasikan. <br><small>${error.message}</small></div>`;
        console.error(error);
      }
    }

    function renderKalender() {
      const filterDesa = filterDesaEl.value;
      const filterStatus = filterStatusEl.value;

      let dataFilter = allData.filter(item => {
        const matchDesa = filterDesa === 'semua' || item.desa === filterDesa;
        const matchStatus = filterStatus === 'semua' || item.status === filterStatus;
        return matchDesa && matchStatus;
      });

      statsEl.textContent = `${dataFilter.length} kegiatan ditemukan`;

      if(dataFilter.length === 0) {
        listEl.innerHTML = `<div class="loading">Tidak ada jadwal yang cocok dengan filter</div>`;
        return;
      }

      listEl.innerHTML = dataFilter.map(item => {
        const statusClass = item.status.toLowerCase().replace(/\s+/g, '-');
        return `
          <div class="card">
            <div class="card-header">
              <span class="tanggal-badge">${item.tanggal}</span>
              <span class="status-badge status-${statusClass}">${item.status}</span>
            </div>
            <h3>${item.kegiatan}</h3>
            <div class="meta">
              <div class="meta-item">
                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                <span>${item.desa}</span>
              </div>
              <div class="meta-item">
                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
                <span>${item.jam}</span>
              </div>
            </div>
            ${item.keterangan? `<div class="keterangan">${item.keterangan}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    filterDesaEl.addEventListener('change', renderKalender);
    filterStatusEl.addEventListener('change', renderKalender);
    loadData();

    // Auto refresh tiap 5 menit
    setInterval(loadData, 300000);
  </script>
</body>
</html>
