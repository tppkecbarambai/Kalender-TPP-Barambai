<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalender Pendampingan TPP Kec. Barambai</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --success: #059669;
      --warning: #d97706;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --card: #0f172a;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --border: #1e293b;
        --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.3);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
   .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header {
      text-align: center;
      margin-bottom: 28px;
      padding: 40px 24px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 24px;
      color: white;
      box-shadow: var(--shadow-lg);
    }
    header h1 { font-size: 2rem; margin-bottom: 8px; font-weight: 800; letter-spacing: -0.5px; }
    header p { opacity: 0.9; margin-bottom: 24px; font-size: 16px; }
   .btn-blogspot {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: var(--primary);
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
   .btn-blogspot:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
   .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 16px;
      margin-bottom: 24px;
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
   .filter-group label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }
   .filter-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-weight: 500;
      transition: all 0.2s;
    }
   .filter-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
   .stats {
      display: flex;
      align-items: end;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
    }
   .loading,.error,.empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      background: var(--card);
      border-radius: 20px;
      border: 1px solid var(--border);
    }
   .loading { color: var(--text-muted); }
   .error { color: #dc2626; }
   .kalender-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 20px;
    }
   .card {
      background: var(--card);
      border-radius: 20px;
      padding: 24px;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
   .card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
   .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      gap: 12px;
    }
   .tanggal-badge {
      background: var(--bg);
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
   .status-badge {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
    }
   .status-akan-datang { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
   .status-selesai { background: rgba(5, 150, 105, 0.1); color: var(--success); }
   .status-ditunda { background: rgba(217, 119, 6, 0.1); color: var(--warning); }
   .card h3 {
      font-size: 1.25rem;
      margin-bottom: 16px;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }
   .meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
   .meta-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 500;
    }
   .meta-item svg { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
   .keterangan {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      border: 1px solid var(--border);
    }
    footer {
      text-align: center;
      margin-top: 48px;
      padding: 32px;
      color: var(--text-muted);
      font-size: 14px;
    }
    footer a { color: var(--primary); text-decoration: none; font-weight: 700; }
    @media (max-width: 768px) {
     .container { padding: 12px; }
      header { padding: 32px 20px; border-radius: 20px; }
      header h1 { font-size: 1.6rem; }
     .kalender-grid { grid-template-columns: 1fr; gap: 16px; }
     .controls { grid-template-columns: 1fr; }
     .stats { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📅 Kalender Pendampingan TPP</h1>
      <p>Kecamatan Barambai | Update Otomatis dari Google Sheets</p>
      <a href="https://tppkecamatanbarambai.blogspot.com/?m=1" target="_blank" class="btn-blogspot">
        Kunjungi Blogspot TPP →
      </a>
    </header>

    <div class="controls">
      <div class="filter-group">
        <label for="filter-desa">Filter Desa</label>
        <select id="filter-desa">
          <option value="semua">Semua Desa</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-status">Filter Status</label>
        <select id="filter-status">
          <option value="semua">Semua Status</option>
          <option value="Akan Datang">Akan Datang</option>
          <option value="Selesai">Selesai</option>
          <option value="Ditunda">Ditunda</option>
        </select>
      </div>
      <div class="stats" id="stats">Memuat data...</div>
    </div>

    <div id="kalender-list" class="kalender-grid">
      <div class="loading">Mengambil data terbaru dari Google Sheets...</div>
    </div>

    <footer>
      <p>Dikelola oleh Tim Pendamping Profesional Kec. Barambai</p>
      <p>Data sinkron otomatis dari <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vQQI4y7_aieOr6S-pQUvGNi0lWiQLqGU34VuGyfUkAHfM3KFtepOIbo_wRcKn2nDg/pubhtml" target="_blank">Google Sheets</a></p>
    </footer>
  </div>

  <script>
    // ===== LINK GOOGLE SHEETS SUDAH DIMASUKKAN =====
    const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQQI4y7_aieOr6S-pQUvGNi0lWiQLqGU34VuGyfUkAHfM3KFtepOIbo_wRcKn2nDg/pub?gid=1997673015&single=true&output=csv';
    // ================================================

    const listEl = document.getElementById('kalender-list');
    const filterDesaEl = document.getElementById('filter-desa');
    const filterStatusEl = document.getElementById('filter-status');
    const statsEl = document.getElementById('stats');

    // Parser CSV yang aman buat koma, kutip, dan enter
    function parseCSV(text) {
      const rows = text.split(/\r?\n/).filter(row => row.trim());
      if (rows.length < 2) return [];
      
      const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, '').replace(/\s+/g, ''));
      
      return rows.slice(1).map(row => {
        const values = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];
        let obj = {};
        headers.forEach((header, i) => {
          let val = values[i]? values[i].replace(/^"|"$/g, '').trim() : '';
          obj[header] = val;
        });
        return obj;
      }).filter(obj => obj.tanggal && obj.desa); // Filter baris kosong
    }

    let allData = [];

    async function loadData() {
      try {
        const response = await fetch(sheetURL + '&cache=' + Date.now());
        if (!response.ok) throw new Error('Gagal fetch');
        const csvText = await response.text();
        allData = parseCSV(csvText).reverse(); // Entry terbaru di Sheets muncul paling atas

        // Isi dropdown desa - FIX: cuma ambil kolom 'desa'
        const desaUnik = [...new Set(allData.map(k => k.desa))].filter(d => d).sort();
        filterDesaEl.innerHTML = '<option value="semua">Semua Desa</option>';
        desaUnik.forEach(desa => {
          filterDesaEl.innerHTML += `<option value="${desa}">${desa}</option>`;
        });

        renderKalender();
      } catch (error) {
        listEl.innerHTML = `<div class="error">
          <h3>Gagal memuat data</h3>
          <p>Pastikan Google Sheets sudah dipublikasikan ke web</p>
          <small>${error.message}</small>
        </div>`;
        console.error(error);
      }
    }

    function renderKalender() {
      const filterDesa = filterDesaEl.value;
      const filterStatus = filterStatusEl.value;

      let dataFilter = allData.filter(item => {
        const matchDesa = filterDesa === 'semua' || item.desa === filterDesa;
        const matchStatus = filterStatus === 'semua' || item.status === filterStatus;
        return matchDesa && matchStatus;
      });

      statsEl.textContent = `${dataFilter.length} kegiatan ditemukan`;

      if(dataFilter.length === 0) {
        listEl.innerHTML = `<div class="empty">
          <h3>Tidak ada jadwal</h3>
          <p>Coba ganti filter atau cek Google Sheets</p>
        </div>`;
        return;
      }

      listEl.innerHTML = dataFilter.map(item => {
        const statusClass = item.status.toLowerCase().replace(/\s+/g, '-');
        return `
          <div class="card">
            <div class="card-header">
              <span class="tanggal-badge">${item.tanggal}</span>
              <span class="status-badge status-${statusClass}">${item.status}</span>
            </div>
            <h3>${item.kegiatan}</h3>
            <div class="meta">
              <div class="meta-item">
                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"></path></svg>
                <span>${item.desa}</span>
              </div>
              <div class="meta-item">
                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"></path></svg>
                <span>${item.jam}</span>
              </div>
            </div>
            ${item.keterangan? `<div class="keterangan">${item.keterangan}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    filterDesaEl.addEventListener('change', renderKalender);
    filterStatusEl.addEventListener('change', renderKalender);
    loadData();

    // Auto refresh tiap 3 menit biar selalu update
    setInterval(loadData, 180000);
  </script>
</body>
</html>
